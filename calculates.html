<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div>
        <h1>Simple and function</h1>
        <input type="text" name="second" id="second" />
        <select name="" id="ope">
            <option value="+">Addition(+)</option>
            <option value="-">Substraction(-)</option>
            <option value="*">Multiply(*)</option>
            <option value="/">Divide(/)</option>
        </select>
        <input type="text" name="third" id="third" />
        <br /><br />
        <button onclick="add()">Submit</button>
        <input type="text" name="" id="res" readonly="" />

    </div>

    <!-- ===============script============== -->
    <script>
        function add() {
            const num1 = parseInt(document.getElementById("second").value)
            const num2 = parseInt(document.getElementById("third").value);
            const operator = document.getElementById("ope").value;

            let result;
            if (operator === "+") {
                result = (num1 + num2)
                // console.log(result)
            }
            else if (operator === "-") {
                result = num1 - num2
            }
            else if (operator === "*") {
                result = num1 * num2
            }
            else if (operator === "/") {
                result = num1 / num2
            }
            document.getElementById("res").value = result
        }
    </script>
</body>

</html>
